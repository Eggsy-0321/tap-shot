<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>TapShot</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="ui">
    <div id="scoreText">SCORE: 0</div>
    <div id="playControls">
      <div id="timeText">TIME: 40</div>
      <button id="pauseButton" class="iconButton" type="button" aria-label="ゲームを一時停止">
        <img src="assets/images/pause-button.png" alt="" />
      </button>
    </div>
  </div>

  <div id="startScreen">
    <img src="assets/images/tapshot-title.png" alt="TapShot" />
  </div>

  <div id="countdownScreen">
    <div id="countdownText">3</div>
  </div>

  <div id="pauseScreen">
    <h1>PAUSED</h1>
  </div>

  <div id="curtainTransition" aria-hidden="true">
    <img src="assets/images/game-over-curtain-draped.png" alt="" />
  </div>

  <div id="gameOverScreen">
    <h1>TIME UP</h1>
    <p id="finalScoreText">SCORE: 0</p>
    <button id="restartButton" type="button">RETRY</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
