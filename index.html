<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Target Train Demo Fixed</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="ui">
    <div id="scoreText">SCORE: 0</div>
    <div id="timeText">TIME: 60</div>
  </div>

  <div id="startScreen">
    <h1>Target Train</h1>
    <p>流れてくる的をタッチして得点を集めよう</p>
    <p>5 / 10 / 15 点の的が出現します</p>
    <button id="startButton" type="button">START</button>
    <div class="hint">ボタン以外でも画面中央のタッチで開始できます</div>
  </div>

  <div id="gameOverScreen">
    <h1>TIME UP</h1>
    <p id="finalScoreText">SCORE: 0</p>
    <button id="restartButton" type="button">RETRY</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
